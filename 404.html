<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>페이지를 찾을 수 없습니다 | Deepbind</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231a6ef5'/><text y='.88em' font-size='62' font-family='system-ui,sans-serif' font-weight='800' fill='white' x='14'>DB</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-hero {
      min-height: 80vh; display: flex; align-items: center;
      background: linear-gradient(155deg, #050d1a 0%, #091c38 48%, #0c2546 100%);
      color: var(--text-inv);
    }

      font-size: clamp(5rem,14vw,9rem); font-weight: 800; letter-spacing: -.06em;

      background: linear-gradient(135deg, #1fb8f5 0%, #1a6ef5 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
  </style>
</head>
<body>
  <header class="site-header scrolled">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="Deepbind 홈으로 이동">
        <span class="brand-mark">DB</span>
        <span class="brand-text"><strong>Deepbind</strong></span>
      </a>
    </div>
  </header>
  <div class="error-hero">
    <div class="container" style="text-align:center;padding:60px 0;">
      <div class="error-code">404</div>
      <h1 style="margin:16px 0 12px;font-size:1.8rem;letter-spacing:-.02em;">페이지를 찾을 수 없습니다</h1>

  </div>

</html>
